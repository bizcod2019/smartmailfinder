services:
  - type: web
    name: email-research-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run api/index.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: false
    healthCheckPath: /